version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: spis-castle-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - spis-network

  # FastAPI Backend
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: spis-castle-backend
    restart: always
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=spis_castle
      - JWT_SECRET=change-this-to-a-secure-secret-key
    volumes:
      - ../assets/uploads:/app/uploads
    depends_on:
      - mongodb
    networks:
      - spis-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: spis-castle-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - spis-network

volumes:
  mongo_data:

networks:
  spis-network:
    driver: bridge
