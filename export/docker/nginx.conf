server {
    listen 80;
    server_name _;
    client_max_body_size 200M;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API
    location /api/ {
        proxy_pass http://backend:8001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_buffering off;
    }

    # Health check
    location /health {
        proxy_pass http://backend:8001/api/health;
    }

    # Landing page
    location / {
        default_type text/html;
        return 200 '<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Spis Castle Audio Guide</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:#1A1A2E;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh}a{color:#D4A017}.c{text-align:center;padding:40px;max-width:500px}h1{font-size:2.2em;margin-bottom:8px}h2{color:#D4A017;font-size:1.1em;margin-bottom:24px;font-weight:400}p{color:#aaa;margin-bottom:16px;line-height:1.6}.b{display:inline-block;padding:14px 36px;background:#D4A017;color:#1A1A2E;text-decoration:none;border-radius:30px;font-weight:700;font-size:1.1em;margin-top:8px}.f{margin-top:32px;font-size:.85em;color:#555}</style></head><body><div class="c"><h1>Spis Castle</h1><h2>Ultimate Audio Tour Guide</h2><p>9 languages &bull; 17 stops &bull; VR experience<br>Download the Expo Go app and scan QR code to explore.</p><a href="/api/health" class="b">API Status</a><p class="f">&copy; 2026 Spis Castle Audio Guide</p></div></body></html>';
    }
}

