server {
    listen 80;
    server_name _;
    client_max_body_size 200M;

    location /api/ {
        proxy_pass http://backend:8001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    location /health {
        proxy_pass http://backend:8001/api/health;
    }

    location / {
        default_type text/html;
        return 200 '<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Spis Castle Audio Guide</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:#1A1A2E;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh}.c{text-align:center;padding:40px}h1{font-size:2.5em;margin-bottom:10px}h2{color:#D4A017;font-size:1.2em;margin-bottom:20px}p{color:#aaa;margin-bottom:20px}.b{display:inline-block;padding:15px 40px;background:#D4A017;color:#fff;text-decoration:none;border-radius:30px;font-weight:700}</style></head><body><div class="c"><h1>Spis Castle</h1><h2>Audio Tour Guide</h2><p>Download Expo Go and scan QR to start.</p><p>API: <a href="/api/health" style="color:#D4A017">/api/health</a></p></div></body></html>';
    }
}
